name: macOS Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    name: Build & test (macOS)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Lint install_all_macos.sh
        run: |
          bash -n install_all_macos.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -S warning install_all_macos.sh || true
          fi

      - name: Validate macOS one-click script CLI surface
        run: |
          chmod +x install_all_macos.sh
          ./install_all_macos.sh help
          ./install_all_macos.sh list
          ./install_all_macos.sh install codex --dry-run --no-launch-agent

      - name: Run macOS-relevant unit tests
        # The full unittest suite is Windows-coupled (winreg, ctypes.windll,
        # ntpath semantics, hardcoded \\-paths) and is exercised on the
        # Windows build/CI. Here we run only the tests that target macOS
        # behaviour and the platform-detection helpers so they get exercised
        # in a real darwin environment.
        run: |
          python - <<'PY'
          import sys, unittest
          KEYWORDS = ("macos", "darwin", "launch_agent", "launchd",
                      "brew", "homebrew", "is_macos", "is_linux", "is_windows")
          loader = unittest.TestLoader()
          suite = loader.loadTestsFromName("test_ai_cli_installer_gui")

          def flatten(s):
              for t in s:
                  if isinstance(t, unittest.TestSuite):
                      yield from flatten(t)
                  else:
                      yield t

          selected = [t for t in flatten(suite)
                      if any(k in t.id().lower() for k in KEYWORDS)]
          print(f"Running {len(selected)} macOS-relevant tests")
          runner = unittest.TextTestRunner(verbosity=2)
          result = runner.run(unittest.TestSuite(selected))
          sys.exit(0 if result.wasSuccessful() else 1)
          PY

      - name: Build macOS binary with PyInstaller
        run: |
          python -m PyInstaller --clean --noconfirm --log-level ERROR InstallTheCli.spec

      - name: Package macOS artifact
        id: package
        run: |
          set -euo pipefail
          cd dist
          if [ -d InstallTheCli.app ]; then
            ARTIFACT="InstallTheCli-macos.zip"
            ditto -c -k --sequesterRsrc --keepParent InstallTheCli.app "$ARTIFACT"
          elif [ -f InstallTheCli ]; then
            ARTIFACT="InstallTheCli-macos.zip"
            zip -q "$ARTIFACT" InstallTheCli
          else
            echo "ERROR: PyInstaller did not produce InstallTheCli.app or InstallTheCli." >&2
            ls -la
            exit 1
          fi
          shasum -a 256 "$ARTIFACT" > "${ARTIFACT%.zip}-SHA256SUMS.txt"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: InstallTheCli-macos
          path: |
            dist/${{ steps.package.outputs.artifact }}
            dist/InstallTheCli-macos-SHA256SUMS.txt
          if-no-files-found: error

      - name: Attach macOS artifact to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ZIP="dist/InstallTheCli-${TAG}-macos.zip"
          RELEASE_SUMS="dist/InstallTheCli-${TAG}-macos-SHA256SUMS.txt"
          mv "dist/${{ steps.package.outputs.artifact }}" "$RELEASE_ZIP"
          shasum -a 256 "$RELEASE_ZIP" > "$RELEASE_SUMS"
          gh release upload "$TAG" "$RELEASE_ZIP" "$RELEASE_SUMS" --clobber
